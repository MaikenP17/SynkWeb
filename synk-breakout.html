<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SYNK Breakout — Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
  <script src="Medios/sounds/synk-audio.js"></script>
  <style>
    :root { --dark: #0D0D0D; --cream: #F7F4EF; --purple: #7B3FF2; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: rgba(123,63,242,0.38); color: inherit; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark); color: var(--cream);
      min-height: 100vh; overflow-x: hidden;
      display: flex; flex-direction: column;
    }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid rgba(247,244,239,0.07);
      flex-shrink: 0;
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem; font-weight: 600; letter-spacing: 0.25em;
      text-decoration: none; color: var(--cream);
    }
    .back-link {
      font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(247,244,239,0.35); text-decoration: none; transition: color 0.3s;
    }
    .back-link:hover { color: var(--cream); }

    main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; padding: 1.5rem 1rem 2rem; gap: 1rem;
    }
    .game-header {
      width: 100%; max-width: 520px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .game-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.6rem; font-weight: 900; text-transform: uppercase; letter-spacing: -0.01em;
    }
    .hud { display: flex; align-items: center; gap: 1.5rem; }
    .hud-item { display: flex; flex-direction: column; align-items: flex-end; gap: 0.15rem; }
    .hud-label { font-size: 0.55rem; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(247,244,239,0.35); }
    .hud-val {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem; font-weight: 900; line-height: 1;
      transition: transform 0.1s;
    }
    .hud-val.pop { transform: scale(1.3); }
    #scoreVal { color: var(--purple); }
    #livesVal { color: var(--cream); letter-spacing: 0.08em; font-size: 1rem; }

    #canvasWrap {
      width: 100%; max-width: 520px;
      border: 1px solid rgba(123,63,242,0.2);
      cursor: none; position: relative; overflow: hidden;
      transition: box-shadow 0.25s;
    }
    #canvasWrap.glow { box-shadow: 0 0 28px rgba(123,63,242,0.5); }
    canvas { display: block; width: 100%; height: auto; }

    .btn-start {
      background: var(--purple); color: var(--cream);
      border: none; cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase;
      padding: 0.7rem 2.2rem;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-start:hover { background: #9B59F5; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(123,63,242,0.4); }
    .btn-start:active { transform: translateY(0); }
    .hint { font-size: 0.6rem; letter-spacing: 0.15em; color: rgba(247,244,239,0.2); text-transform: uppercase; }
  </style>
</head>
<body>
  <header class="header">
    <a href="index.html" class="logo">SYNK</a>
    <a href="synk-arcade.html" class="back-link" onmouseenter="SynkAudio.hover()">← Arcade</a>
  </header>

  <main>
    <div class="game-header">
      <h1 class="game-title">SYNK Breakout</h1>
      <div class="hud">
        <div class="hud-item">
          <span class="hud-label">Score</span>
          <span class="hud-val" id="scoreVal">0</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">Vidas</span>
          <span class="hud-val" id="livesVal">●●●</span>
        </div>
      </div>
    </div>

    <div id="canvasWrap"><canvas id="gc"></canvas></div>

    <button class="btn-start" id="startBtn"
      onclick="startGame()"
      onmouseenter="SynkAudio.hover()">Iniciar</button>
    <p class="hint">Mouse / Touch para mover · Flechas como alternativa</p>
  </main>

  <script>
    const COLS = 8, ROWS = 5;
    const BRICK_COLORS = ['#C09BFF', '#9B59F5', '#7B3FF2', '#5E2DB8', '#3D1A8A'];

    let canvas, ctx;
    let ball, paddle, bricks;
    let score = 0, lives = 3;
    let gameState = 'idle';
    let animId = null;
    const keys = {};

    // ── Visual effects ──────────────────────────────
    let particles = [];
    let shake = 0, flashColor = null, flashAlpha = 0;
    let paddleGlow = 0;
    let ballTrail = [];

    function spawnParticles(x, y, color, count, spread) {
      const n = Math.min(count, 12);
      for (let i = 0; i < n; i++) {
        const angle = (Math.PI * 2 * i) / n + Math.random() * 0.5;
        const spd = spread * (0.4 + Math.random() * 0.8);
        particles.push({
          x, y,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd - 1.5,
          life: 1,
          decay: 0.038 + Math.random() * 0.04,
          size: 2 + Math.random() * 3,
          color
        });
      }
      if (particles.length > 100) particles.length = 100;
    }

    function tickParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.1; p.vx *= 0.93;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.life * p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
        ctx.restore();
      });
    }

    // ── Core draw ───────────────────────────────────
    function draw() {
      const w = canvas.width, h = canvas.height;
      ctx.fillStyle = '#0D0D0D';
      ctx.fillRect(0, 0, w, h);

      // Ball trail
      ballTrail.forEach((pos, i) => {
        const a = (i / ballTrail.length) * 0.25;
        ctx.save();
        ctx.globalAlpha = a;
        ctx.fillStyle = '#F7F4EF';
        ctx.beginPath(); ctx.arc(pos.x, pos.y, ball.r * 0.65, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      });

      // Bricks
      bricks.forEach(b => {
        if (!b.alive) return;
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.fillStyle = 'rgba(255,255,255,0.13)';
        ctx.fillRect(b.x, b.y, b.w, 2);
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(b.x, b.y + b.h - 2, b.w, 2);
      });

      // Ball glow
      const bg = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, ball.r * 3.5);
      bg.addColorStop(0, 'rgba(247,244,239,0.28)');
      bg.addColorStop(1, 'rgba(247,244,239,0)');
      ctx.fillStyle = bg;
      ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r * 3.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#F7F4EF';
      ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fill();

      // Paddle with optional glow
      if (paddleGlow > 0) {
        ctx.shadowBlur = paddleGlow * 22;
        ctx.shadowColor = '#7B3FF2';
        paddleGlow *= 0.78;
      }
      ctx.fillStyle = `rgba(247,244,239,${0.88 + paddleGlow * 0.12})`;
      ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#7B3FF2';
      ctx.fillRect(paddle.x, paddle.y, paddle.w, 2);

      drawParticles();

      // Flash overlay
      if (flashAlpha > 0.005) {
        ctx.fillStyle = flashColor || 'rgba(247,244,239,1)';
        ctx.globalAlpha = flashAlpha;
        ctx.fillRect(0, 0, w, h);
        ctx.globalAlpha = 1;
        flashAlpha *= 0.8;
      }
    }

    function drawIdle() {
      const w = canvas.width, h = canvas.height;
      ctx.fillStyle = '#0D0D0D';
      ctx.fillRect(0, 0, w, h);
      const gapX = 5, gapY = 5;
      const bw = (w - (COLS + 1) * gapX) / COLS;
      const bh = Math.max(14, Math.round(w * 0.034));
      const topOff = Math.round(h * 0.07);
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          ctx.fillStyle = BRICK_COLORS[r] + '50';
          ctx.fillRect(gapX + c * (bw + gapX), topOff + r * (bh + gapY), bw, bh);
        }
      }
      ctx.fillStyle = 'rgba(247,244,239,0.05)';
      ctx.font = `900 ${Math.round(w * 0.1)}px 'Barlow Condensed', sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('SYNK', w / 2, h * 0.68);
    }

    function showOverlay(text, win) {
      const w = canvas.width, h = canvas.height;
      ctx.fillStyle = 'rgba(13,13,13,0.86)';
      ctx.fillRect(0, 0, w, h);
      const fs = Math.round(w * 0.1);
      ctx.font = `900 ${fs}px 'Barlow Condensed', sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = win ? '#9B59F5' : '#F7F4EF';
      ctx.fillText(text, w / 2, h / 2 - fs);
      ctx.font = `400 ${Math.round(fs * 0.38)}px 'Inter', sans-serif`;
      ctx.fillStyle = 'rgba(247,244,239,0.45)';
      ctx.fillText(`Score: ${score}`, w / 2, h / 2 + fs * 0.3);
      document.getElementById('startBtn').textContent = 'Reiniciar';
    }

    // ── Game logic ──────────────────────────────────
    function loop() {
      if (gameState !== 'playing') return;

      // Keyboard paddle
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) { paddle.x -= paddle.speed; clampPaddle(); }
      if (keys['ArrowRight'] || keys['d'] || keys['D']) { paddle.x += paddle.speed; clampPaddle(); }

      // Update trail
      ballTrail.push({ x: ball.x, y: ball.y });
      if (ballTrail.length > 5) ballTrail.shift();

      ball.x += ball.dx;
      ball.y += ball.dy;

      // Wall collisions
      if (ball.x - ball.r < 0) { ball.x = ball.r; ball.dx = Math.abs(ball.dx); SynkAudio.bounce(); }
      if (ball.x + ball.r > canvas.width) { ball.x = canvas.width - ball.r; ball.dx = -Math.abs(ball.dx); SynkAudio.bounce(); }
      if (ball.y - ball.r < 0) { ball.y = ball.r; ball.dy = Math.abs(ball.dy); SynkAudio.bounce(); }

      // Paddle collision
      if (
        ball.dy > 0 &&
        ball.y + ball.r >= paddle.y &&
        ball.y + ball.r <= paddle.y + paddle.h + Math.abs(ball.dy) + 2 &&
        ball.x >= paddle.x - ball.r &&
        ball.x <= paddle.x + paddle.w + ball.r
      ) {
        const rel = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
        const angle = rel * (Math.PI / 3);
        const spd = ball.speed;
        ball.dx = spd * Math.sin(angle);
        ball.dy = -Math.abs(spd * Math.cos(angle));
        ball.y = paddle.y - ball.r - 1;
        SynkAudio.bounce();
        paddleGlow = 1;
        flashAlpha = 0.04;
        flashColor = 'rgba(123,63,242,1)';
      }

      // Shake decay
      if (shake > 0.3) {
        const sx = (Math.random() - 0.5) * shake;
        const sy = (Math.random() - 0.5) * shake;
        shake *= 0.72;
        ctx.save(); ctx.translate(sx, sy);
        tickParticles(); draw();
        ctx.restore();
      } else {
        shake = 0;
        tickParticles(); draw();
      }

      // Brick collisions
      let alive = 0;
      for (const b of bricks) {
        if (!b.alive) continue;
        alive++;
        if (
          ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
          ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h
        ) {
          b.alive = false; alive--;
          score += 10; updateHUD();
          SynkAudio.breakBrick();
          // Brick particles
          spawnParticles(b.x + b.w / 2, b.y + b.h / 2, b.color, 10, 3.5);
          // Flash border glow
          const wrap = document.getElementById('canvasWrap');
          wrap.classList.add('glow');
          setTimeout(() => wrap.classList.remove('glow'), 250);
          // Bounce
          const olL = ball.x + ball.r - b.x, olR = b.x + b.w - (ball.x - ball.r);
          const olT = ball.y + ball.r - b.y, olB = b.y + b.h - (ball.y - ball.r);
          if (Math.min(olL, olR) < Math.min(olT, olB)) ball.dx = -ball.dx;
          else ball.dy = -ball.dy;
          // Subtle speed increase every 10 bricks
          if (score % 100 === 0 && score > 0) {
            ball.speed = Math.min(ball.speed * 1.06, (canvas.width / 480) * 7.5);
            const spd = ball.speed;
            const len = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy) || 1;
            ball.dx = (ball.dx / len) * spd;
            ball.dy = (ball.dy / len) * spd;
          }
          break;
        }
      }

      if (alive === 0) {
        gameState = 'win';
        SynkAudio.victory();
        // Victory particle burst
        for (let i = 0; i < 5; i++) {
          setTimeout(() => {
            const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height * 0.5;
            spawnParticles(x, y, BRICK_COLORS[Math.floor(Math.random() * BRICK_COLORS.length)], 12, 5);
          }, i * 120);
        }
        flashColor = 'rgba(123,63,242,1)';
        flashAlpha = 0.25;
        setTimeout(() => showOverlay('NIVEL COMPLETO', true), 500);
        animId = requestAnimationFrame(loop);
        return;
      }

      if (ball.y - ball.r > canvas.height) {
        lives--; updateHUD();
        if (lives <= 0) {
          gameState = 'gameover';
          SynkAudio.gameOver();
          shake = 10;
          flashColor = 'rgba(247,244,239,1)';
          flashAlpha = 0.2;
          setTimeout(() => showOverlay('GAME OVER', false), 400);
          animId = requestAnimationFrame(loop);
          return;
        }
        ball.x = canvas.width / 2; ball.y = canvas.height * 0.55;
        const spd = ball.speed;
        ball.dx = spd * (Math.random() > 0.5 ? 0.6 : -0.6);
        ball.dy = -spd * 0.8;
        ballTrail = [];
      }

      animId = requestAnimationFrame(loop);
    }

    function startGame() {
      SynkAudio.init();
      SynkAudio.start();
      score = 0; lives = 3; gameState = 'playing';
      particles = []; ballTrail = []; shake = 0; flashAlpha = 0; paddleGlow = 0;
      updateHUD(); setupObjects();
      cancelAnimationFrame(animId);
      animId = requestAnimationFrame(loop);
      document.getElementById('startBtn').textContent = 'Reiniciar';
    }

    function setupObjects() {
      const w = canvas.width, h = canvas.height;
      paddle = { w: w * 0.18, h: 10, x: w / 2 - w * 0.09, y: h - 32, speed: w * 0.013 };
      ball = {
        x: w / 2, y: h * 0.55,
        r: Math.max(6, Math.round(w * 0.013)),
        speed: (w / 480) * 3.8,
        dx: (w / 480) * 3.8 * (Math.random() > 0.5 ? 0.6 : -0.6),
        dy: -(w / 480) * 3.8 * 0.8,
      };
      const gapX = 5, gapY = 5;
      const bw = (w - (COLS + 1) * gapX) / COLS;
      const bh = Math.max(14, Math.round(w * 0.034));
      const topOff = Math.round(h * 0.07);
      bricks = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          bricks.push({ x: gapX + c * (bw + gapX), y: topOff + r * (bh + gapY), w: bw, h: bh, color: BRICK_COLORS[r], alive: true });
        }
      }
    }

    function clampPaddle() {
      paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));
    }

    function updateHUD() {
      const sv = document.getElementById('scoreVal');
      sv.textContent = score;
      sv.classList.remove('pop'); void sv.offsetWidth; sv.classList.add('pop');
      setTimeout(() => sv.classList.remove('pop'), 150);
      document.getElementById('livesVal').textContent =
        '●'.repeat(Math.max(0, lives)) + '○'.repeat(Math.max(0, 3 - lives));
    }

    function resizeCanvas() {
      const w = Math.min(document.getElementById('canvasWrap').clientWidth, 520);
      canvas.width = w; canvas.height = Math.round(w * 1.05);
      if (gameState === 'playing') setupObjects();
    }

    window.addEventListener('load', function () {
      canvas = document.getElementById('gc');
      ctx = canvas.getContext('2d');
      resizeCanvas();
      window.addEventListener('resize', () => { resizeCanvas(); if (gameState !== 'playing') drawIdle(); });

      canvas.addEventListener('mousemove', e => {
        if (gameState !== 'playing') return;
        const rect = canvas.getBoundingClientRect();
        paddle.x = (e.clientX - rect.left) * (canvas.width / rect.width) - paddle.w / 2;
        clampPaddle();
      });
      canvas.addEventListener('touchmove', e => {
        if (gameState !== 'playing') return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        paddle.x = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width) - paddle.w / 2;
        clampPaddle();
      }, { passive: false });
      canvas.addEventListener('touchstart', () => SynkAudio.init(), { once: true });

      document.addEventListener('keydown', e => {
        keys[e.key] = true;
        if (['ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
      });
      document.addEventListener('keyup', e => keys[e.key] = false);

      ['click', 'touchstart'].forEach(ev =>
        document.addEventListener(ev, () => SynkAudio.init(), { once: true })
      );

      drawIdle();
    });
  </script>
</body>
</html>
